<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuore - Bake & Craft Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Mooli&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Figtree:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=Single+Day&family=Patrick+Hand&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#FFFFFF',
              foreground: '#000000',
              secondary: '#666666',
              accent: '#f7f7f7',
              brand: {
                bg: '#f7f7f7',
                primary: '#000000',
                accent: '#000000', 
                secondary: 'var(--brand-secondary, #bd715d)',
              }
            },
            fontFamily: {
              sans: ['Mooli', 'sans-serif'],
              amatic: ['Amatic SC', 'cursive'],
              cursive: ['Dancing Script', 'cursive'],
              serif: ['Playfair Display', 'serif'],
              mooli: ['Mooli', 'sans-serif'],
              figtree: ['Figtree', 'sans-serif'],
              rubik: ['Rubik', 'sans-serif'],
              singleday: ['Single Day', 'cursive'],
              patrick: ['Patrick Hand', 'cursive'],
            },
            borderRadius: {
              'md': '0.5rem',
              'lg': '0.75rem',
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --background: #FFFFFF;
        --foreground: #000000;
        --secondary: #666666;
        --accent: #f7f7f7;
        --brand-secondary: #bd715d;
      }

      body { 
        background-color: var(--background); 
        color: var(--foreground);
        font-family: 'Mooli', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }

      .menu-active {
        color: #000000 !important;
        font-weight: 600;
      }
      
      .logo-cursive {
        font-family: 'Dancing Script', cursive;
      }
      
      button:active {
        transform: scale(0.96);
      }

      .text-brand-secondary { color: var(--brand-secondary); }
      .bg-brand-secondary { background-color: var(--brand-secondary); }
      .border-brand-secondary { border-color: var(--brand-secondary); }

      button[data-radix-collection-item] {
        transition: transform 0.15s ease-in-out;
      }
      button[data-radix-collection-item]:active,
      button[data-radix-collection-item][data-state="active"],
      button[data-radix-collection-item][data-highlighted],
      button[data-radix-collection-item][aria-selected="true"] {
        transform: scale(1.02);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "jspdf": "https://esm.sh/jspdf@^4.1.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
